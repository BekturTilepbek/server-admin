version: '3.8'

services:
  bot:
    build: .
    container_name: admin_bot
    restart: always
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      # Приватный SSH-ключ для доступа к управляемым серверам (read-only).
      # Раскомментируйте, если перешли на ключевую аутентификацию:
      # - ./secrets/id_ed25519:/app/secrets/id_ed25519:ro
